name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add more as required
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # The aiovelib submodule declares dbus-fast plus the test extras
        # (pytest, pytest-asyncio).
        run: pip install -e ./ext/aiovelib[test]

      - name: Run tests
        run: python -m pytest tests/ ext/aiovelib/tests/ -v
